name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:         # Manual trigger option

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://transcription-app-161r.onrender.com/health)
          echo "Server responded with status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
            exit 1
          fi
